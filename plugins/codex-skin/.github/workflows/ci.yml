name: Codex Skin CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'core-v*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Test theme runtime
        run: npm test

      - name: Verify package contents
        run: npm run pack:check
